name: bootstrap
on: 
  workflow_dispatch:
  schedule:
    - cron:  '0 1-23/2 * * *'

jobs:
  bootstrap_actions:
    runs-on: ubuntu-latest
    permissions: write-all
    steps:
      - name: checkout
        uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98 # main
        with:
          token: ${{ secrets.BOOTSTRAP_WORKFLOWS || github.token }}
      - id: bootstrap
        uses: manjaro-contrib/action-bootstrap-actions@8b271912d6a0918ae8e2448074783367ee6035fb # main
        with:
          upstream: https://aur.archlinux.org/sworkstyle.git
